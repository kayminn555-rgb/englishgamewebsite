<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spin Wheel Premium Studio & Engine V3.6</title>
    <style>
        /* PREMIUM STUDIO THEME V3.6 WITH FULLSCREEN FIX */
        :root {
            --sky-blue-deep: #2980b9;
            --sky-blue-light: #6dd5fa;
            --cloud-white: #ffffff;
            --soft-gray: #f5f6fa;
            --text-dark: #2c3e50;
            --text-muted: #7f8c8d;
            --accent-orange: #e67e22;
            --accent-green: #2ecc71;
            --accent-red: #e74c3c;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background: linear-gradient(135deg, var(--sky-blue-light), #ffffff);
            color: var(--text-dark);
            overflow-x: hidden;
            user-select: none;
        }

        .app-container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            box-sizing: border-box;
        }

        .studio-dashboard {
            width: 100%;
            max-width: 1200px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 30px;
            padding: 45px;
            box-shadow: 0 20px 50px rgba(41, 128, 185, 0.15);
            box-sizing: border-box;
        }

        .studio-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .studio-header h2 {
            margin: 0 0 10px 0;
            color: var(--sky-blue-deep);
            text-transform: uppercase;
            font-size: 34px;
            letter-spacing: 1.5px;
            font-weight: 800;
        }

        .subtitle {
            font-size: 15px;
            color: var(--text-muted);
            margin: 0;
            letter-spacing: 0.5px;
        }

        .studio-workspace {
            display: grid;
            grid-template-columns: 1.3fr 0.7fr;
            gap: 45px;
        }

        .studio-panel {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            padding: 30px;
            box-sizing: border-box;
        }

        .file-dropzone {
            background: rgba(109, 213, 250, 0.08);
            padding: 25px 20px;
            border-radius: 16px;
            margin-bottom: 25px;
            text-align: center;
            border: 2px dashed var(--sky-blue-deep);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .file-dropzone:hover {
            background: rgba(109, 213, 250, 0.15);
            transform: translateY(-2px);
        }

        .file-dropzone p {
            margin: 0;
            font-size: 16px;
            color: var(--sky-blue-deep);
            font-weight: 700;
        }

        .file-dropzone span {
            font-size: 13px;
            color: var(--text-muted);
            display: block;
            margin-top: 6px;
        }

        label {
            font-weight: 700;
            display: block;
            margin-top: 20px;
            margin-bottom: 8px;
            font-size: 13px;
            color: var(--text-dark);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .studio-input {
            width: 100%;
            padding: 14px;
            border: 1px solid rgba(41, 128, 185, 0.25);
            background: rgba(255, 255, 255, 0.9);
            color: var(--text-dark);
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .studio-input:focus {
            outline: none;
            border-color: var(--sky-blue-deep);
            box-shadow: 0 0 15px rgba(109, 213, 250, 0.4);
            background: #ffffff;
        }

        textarea.studio-input {
            height: 90px;
            resize: none;
            line-height: 1.6;
        }

        /* MATRIX LIST ROW ENGINE STYLING */
        .matrix-box-container {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(41, 128, 185, 0.2);
            border-radius: 16px;
            padding: 15px;
            margin-top: 10px;
            max-height: 320px;
            overflow-y: auto;
        }

        .matrix-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            background: #ffffff;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
        }

        .matrix-index {
            font-weight: 800;
            color: var(--sky-blue-deep);
            min-width: 24px;
            text-align: center;
        }

        .matrix-word-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
        }

        .matrix-media-block {
            flex: 1.5;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .matrix-link-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 13px;
        }

        .matrix-file-btn {
            background: #edf2f7;
            border: 1px solid #cbd5e1;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.2s;
        }
        .matrix-file-btn:hover { background: #e2e8f0; transform: scale(1.05); }

        .matrix-row-delete-btn {
            background: #fff5f5;
            border: 1px solid #fed7d7;
            color: var(--accent-red);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .matrix-row-delete-btn:hover { background: #feb2b2; transform: scale(1.05); }

        .btn-add-matrix-row {
            background: #ebf8ff;
            color: var(--sky-blue-deep);
            border: 1px dashed var(--sky-blue-deep);
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.5px;
            transition: all 0.2s;
            margin-top: 5px;
        }
        .btn-add-matrix-row:hover { background: #cbd5e1; transform: translateY(-1px); }

        .action-button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .btn-studio {
            padding: 16px;
            font-size: 15px;
            font-weight: 700;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-download-txt {
            background: linear-gradient(135deg, #7f8c8d, #95a5a6);
            color: white;
            box-shadow: 0 6px 20px rgba(149, 165, 166, 0.25);
        }
        .btn-download-txt:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(149, 165, 166, 0.35);
        }

        .btn-launch-play {
            background: linear-gradient(135deg, var(--sky-blue-deep), #2980b9);
            color: white;
            box-shadow: 0 6px 20px rgba(41, 128, 185, 0.25);
        }
        .btn-launch-play:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(41, 128, 185, 0.4);
        }

        /* RUNTIME SPIN WHEEL EMULATOR */
        .game-section {
            display: none;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 20;
        }

        .game-arena {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: row;
            background: linear-gradient(135deg, var(--sky-blue-light), #a1c4fd, #c2e9fb);
            position: relative;
            box-sizing: border-box;
            overflow: hidden;
        }

        .spin-main-workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            position: relative;
            height: 100%;
            box-sizing: border-box;
        }

        .top-control-row {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
        }

        .btn-fullscreen-toggle {
            background: rgba(44, 62, 80, 0.85);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(5px);
            transition: all 0.2s ease;
        }
        .btn-fullscreen-toggle:hover {
            background: var(--text-dark);
            transform: scale(1.05) translateY(-1px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .live-spin-time-box {
            background: rgba(255, 255, 255, 0.85);
            padding: 10px 22px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 30px rgba(41, 128, 185, 0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 14px;
            color: var(--text-dark);
            backdrop-filter: blur(10px);
        }

        .live-spin-time-box input {
            width: 55px;
            padding: 6px;
            font-size: 14px;
            border-radius: 8px;
            border: 1px solid rgba(41, 128, 185, 0.3);
            text-align: center;
            font-weight: 700;
            color: var(--text-dark);
            background: #ffffff;
        }

        .spin-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: auto;
            position: relative;
            width: 100%;
            height: calc(100% - 80px);
            z-index: 10;
        }

        .ferris-wheel-frame {
            position: relative;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wheel-wrapper {
            position: relative;
            width: 90%;
            height: 90%;
            border-radius: 50%;
            border: 8px solid #ffffff;
            box-shadow: 0 20px 60px rgba(41, 128, 185, 0.2), 0 0 0 4px rgba(255, 255, 255, 0.5);
            background: #ffffff;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #wheelCanvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: block;
        }

        .ferris-iron-leg-left {
            position: absolute;
            bottom: -5%;
            left: 30%;
            width: 3%;
            height: 55%;
            background: linear-gradient(to right, #e2e8f0, #ffffff, #cbd5e1);
            transform: rotate(18deg);
            transform-origin: bottom center;
            z-index: 5;
            border-radius: 6px;
        }

        .ferris-iron-leg-right {
            position: absolute;
            bottom: -5%;
            right: 30%;
            width: 3%;
            height: 55%;
            background: linear-gradient(to right, #e2e8f0, #ffffff, #cbd5e1);
            transform: rotate(-18deg);
            transform-origin: bottom center;
            z-index: 5;
            border-radius: 6px;
        }

        .leg-foot-left {
            position: absolute;
            bottom: -5%;
            left: 23%;
            width: 10%;
            height: 3%;
            background: #94a3b8;
            border-radius: 6px 6px 0 0;
            z-index: 6;
        }

        .leg-foot-right {
            position: absolute;
            bottom: -5%;
            right: 23%;
            width: 10%;
            height: 3%;
            background: #94a3b8;
            border-radius: 6px 6px 0 0;
            z-index: 6;
        }

        .wheel-pointer-right {
            position: absolute;
            top: 50%;
            right: -5%;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            border-top: 20px solid transparent;
            border-bottom: 20px solid transparent;
            border-right: 45px solid #ff7675;
            z-index: 30;
            filter: drop-shadow(-4px 4px 6px rgba(0,0,0,0.15));
        }

        .center-hub {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            width: 16%;
            aspect-ratio: 1/1;
            background: radial-gradient(circle, #ffffff 30%, #f1f5f9 70%, #cbd5e1 100%);
            border: 4px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            z-index: 40;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .spin-trigger-btn {
            width: 85%;
            height: 85%;
            background: linear-gradient(135deg, var(--sky-blue-deep), #3498db);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 6px 15px rgba(41, 128, 185, 0.3);
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .spin-trigger-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 20px rgba(41, 128, 185, 0.4);
        }

        /* IN-GAME SIDEBAR */
        .game-control-sidebar {
            width: 420px;
            height: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255, 255, 255, 0.5);
            padding: 25px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            z-index: 45;
            box-shadow: -10px 0 40px rgba(41, 128, 185, 0.05);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), width 0.3s ease;
        }

        .game-control-sidebar.fullscreen-hide {
            display: none !important;
        }

        .sidebar-title {
            font-size: 16px;
            color: var(--sky-blue-deep);
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-align: center;
            border-bottom: 1px solid rgba(0,0,0,0.06);
            padding-bottom: 12px;
        }

        .btn-update-live {
            background: linear-gradient(135deg, var(--accent-green), #2ecc71);
            color: white;
            border: none;
            padding: 14px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.2);
        }
        .btn-update-live:hover {
            box-shadow: 0 6px 20px rgba(46, 204, 113, 0.3);
            transform: translateY(-2px);
        }

        .bottom-bar {
            margin-top: auto;
            padding-top: 25px;
            border-top: 1px solid rgba(0,0,0,0.06);
        }

        .btn-console {
            width: 100%;
            padding: 14px;
            font-size: 14px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            border: none;
            background: #ff7675;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 118, 117, 0.25);
            transition: all 0.2;
            text-transform: uppercase;
        }
        .btn-console:hover {
            background: #e17055;
            transform: translateY(-2px);
        }

        /* MODALS INSIDE ARENA CONTEXT FOR FIXED FULLSCREEN MATRIX LAYER */
        .overlay-mask {
            display: none;
            position: absolute; /* Changed to absolute to fit within parent Fullscreen Context DOM */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(44, 62, 80, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000;
        }

        .spin-result-popup {
            display: none;
            position: absolute; /* Changed to absolute to align perfectly center during high layer fullscreen view */
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            background: #ffffff;
            color: var(--text-dark);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.25);
            z-index: 2000;
            border: 1px solid rgba(255,255,255,0.8);
            min-width: 350px;
            box-sizing: border-box;
            animation: scaleUpGhibli 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes scaleUpGhibli {
            0% { transform: translate(-50%,-50%) scale(0.85); opacity: 0; }
            100% { transform: translate(-50%,-50%) scale(1); opacity: 1; }
        }

        .spin-result-popup h3 {
            margin: 0;
            font-size: 15px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .spin-result-popup div#spinResultValue {
            font-size: 42px;
            font-weight: 800;
            margin: 15px 0;
            color: var(--sky-blue-deep);
            word-break: break-word;
        }

        .winner-image-frame {
            width: 140px;
            height: 140px;
            border-radius: 15px;
            object-fit: cover;
            margin: 10px auto 20px auto;
            border: 4px solid #f1f5f9;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            display: none;
        }

        .popup-btn-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 25px;
        }

        .btn-popup {
            padding: 12px 26px;
            font-weight: 700;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .btn-popup-remove { background: #ff7675; color: white; }
        .btn-popup-remove:hover { background: #e17055; transform: scale(1.05); }
        .btn-popup-keep { background: var(--accent-green); color: white; }
        .btn-popup-keep:hover { background: #27ae60; transform: scale(1.05); }

        .preview-showcase {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 2px dashed rgba(41, 128, 185, 0.2);
            border-radius: 20px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.4);
            text-align: center;
        }

        .preview-icon {
            font-size: 65px;
            color: var(--sky-blue-deep);
            margin-bottom: 20px;
        }

        /* RESPONSIVE FLUID MEDIA MATRIX GENERATOR */
        @media (max-width: 992px) {
            .game-arena { flex-direction: column; overflow-y: auto; }
            .game-control-sidebar { width: 100%; height: auto; border-left: none; border-top: 1px solid rgba(0,0,0,0.06); }
            .studio-workspace { grid-template-columns: 1fr; }
            .preview-showcase { display: none; }
            .spin-main-workspace { padding: 20px; min-height: 80vh; }
            .ferris-wheel-frame { max-width: 480px; }
        }

        @media (max-width: 480px) {
            .studio-dashboard { padding: 20px 15px; }
            .studio-header h2 { font-size: 24px; }
            .ferris-wheel-frame { max-width: 100%; }
            .live-spin-time-box { padding: 6px 14px; font-size: 12px; }
            .live-spin-time-box input { width: 40px; padding: 4px; }
            .btn-fullscreen-toggle { padding: 8px 14px; font-size: 11px; }
            .spin-trigger-btn { font-size: 11px; }
            .action-button-group { grid-template-columns: 1fr; gap: 12px; }
            .spin-result-popup { min-width: 90%; padding: 25px 15px; }
            .spin-result-popup div#spinResultValue { font-size: 32px; }
        }
    </style>
</head>
<body>

    <div class="app-container" id="studioView">
        <div class="studio-dashboard">
            <div class="studio-header">
                <h2>Spin Wheel Pack Factory V3.6</h2>
                <p class="subtitle">Advanced Fluid Engine with FullScreen Pop-up Architecture Fixed</p>
            </div>
            
            <div class="studio-workspace">
                <div class="studio-panel">
                    <div class="file-dropzone" id="dropzone" onclick="document.getElementById('romLoader').click()">
                        <p>📥 Click or Drag Spin Wheel ROM (.txt)</p>
                        <span>Load your saved configuration data asset file</span>
                        <input type="file" id="romLoader" accept=".txt" style="display: none;" onchange="importSpinWheelROM(event)">
                    </div>

                    <label>Enter Game Title :</label>
                    <input type="text" id="gameTitle" class="studio-input" value="Lucky Premium Spin">

                    <label>Default Spin Duration (Seconds) :</label>
                    <input type="number" id="spinDuration" class="studio-input" value="5" min="2" max="60">

                    <label>📋 Bulk Text Input (Fast Copy-Paste Box) :</label>
                    <textarea id="wordItems" class="studio-input" placeholder="Item 1&#10;Item 2&#10;Item 3" oninput="syncBulkTextToMatrix()"></textarea>

                    <label>🔗 Bulk Image Links (Fast Copy-Paste Box) :</label>
                    <textarea id="imageLinks" class="studio-input" placeholder="https://example.com/pic1.jpg&#10;https://example.com/pic2.jpg" style="height: 70px;" oninput="syncBulkLinksToMatrix()"></textarea>

                    <label>🛠️ Custom Word & Image Matrix Slots (One-by-One Controller) :</label>
                    <div class="matrix-box-container" id="matrixRowsWrapper"></div>
                    <button class="btn-add-matrix-row" onclick="addBlankMatrixRowCell()">➕ Add Item Row</button>

                    <div class="action-button-group">
                        <button class="btn-studio btn-download-txt" onclick="exportSpinWheelROMOnly()">💾 Download TXT ROM</button>
                        <button class="btn-studio btn-launch-play" onclick="launchAndPlayDirectly()">🎮 Launch & Play Game</button>
                    </div>
                </div>

                <div class="preview-showcase">
                    <div class="preview-icon">🎡</div>
                    <h3 style="color: var(--sky-blue-deep); margin: 0 0 10px 0; font-weight: 800;">FullScreen Layer Updated</h3>
                    <p style="color: var(--text-muted); font-size: 14px; max-width: 320px; margin: 0 auto; line-height: 1.7; text-align: left;">
                        
                    </p>
                </div>
            </div>
        </div>
    </div>

    <div class="game-section" id="gameRuntimeView">
        <div class="game-arena" id="arenaMainElement">
            
            <div class="overlay-mask" id="mask"></div>
            <div class="spin-result-popup" id="spinResultBox">
                <h3>🎉 Selected Winner</h3>
                <div id="spinResultValue">-</div>
                <img id="spinResultImg" class="winner-image-frame" src="" alt="Winner Graphic Asset">
                <div class="popup-btn-container">
                    <button class="btn-popup btn-popup-remove" onclick="removeWinnerNamePermanently()">Remove Asset</button>
                    <button class="btn-popup btn-popup-keep" onclick="closeConsoleSpinPopup()">Keep & Close</button>
                </div>
            </div>

            <div class="spin-main-workspace">
                <div class="top-control-row">
                    <button class="btn-fullscreen-toggle" onclick="toggleAdvancedFullscreenMode()">🖥️ Full Screen</button>
                    
                    <div class="live-spin-time-box">
                        <span>⚡ Speed:</span>
                        <input type="number" id="liveSecondsInput" value="5" min="2" max="60">
                        <span>Secs</span>
                    </div>
                </div>

                <div class="spin-container">
                    <div class="ferris-wheel-frame">
                        <div class="ferris-iron-leg-left"></div>
                        <div class="ferris-iron-leg-right"></div>
                        <div class="leg-foot-left"></div>
                        <div class="leg-foot-right"></div>
                        
                        <div class="wheel-wrapper">
                            <canvas id="wheelCanvas" width="600" height="600"></canvas>
                            <div class="wheel-pointer-right" id="wheelPointer"></div>
                        </div>

                        <div class="center-hub">
                            <button class="spin-trigger-btn" id="spinActionBtn" onclick="toggleWheelSpinEngine()">SPIN</button>
                        </div>
                    </div>
                </div>
                <div></div>
            </div>

            <div class="game-control-sidebar" id="gameControlSidebar">
                <div class="sidebar-title">📝 In-Game Controller</div>
                
                <label style="margin-top:5px; margin-bottom:4px; font-size:11px;">Modify Items List:</label>
                <textarea id="runtimeWordItems" class="studio-input" style="height: 140px; font-size: 13px; margin-bottom: 10px;"></textarea>

                <label style="margin-top:0; margin-bottom:4px; font-size:11px;">Modify Image Links / URLs:</label>
                <textarea id="runtimeImageLinks" class="studio-input" style="height: 140px; font-size: 13px; margin-bottom: 10px;" placeholder="One URL per line"></textarea>
                
                <button class="btn-update-live" onclick="syncRuntimeSidebarToWheel()">🔄 Update Wheel</button>
                
                <div class="bottom-bar">
                    <button class="btn-console" onclick="quitActiveGameEngine()">Close Engine</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SoundFX = {
            ctx: null,
            init() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.ctx.state === 'suspended') this.ctx.resume();
            },
            playFlip(speedFactor = 1) {
                this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                let targetFreq = 450 + (speedFactor * 150);
                osc.frequency.setValueAtTime(targetFreq, this.ctx.currentTime);
                gain.gain.setValueAtTime(0.04, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.001, this.ctx.currentTime + 0.015);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.015);
            },
            playWin() {
                this.init();
                const t = this.ctx.currentTime;
                const tone = (f, s, d) => {
                    const o = this.ctx.createOscillator();
                    const g = this.ctx.createGain();
                    o.type = 'square';
                    o.frequency.setValueAtTime(f, s);
                    g.gain.setValueAtTime(0.05, s);
                    g.gain.linearRampToValueAtTime(0.001, s + d);
                    o.connect(g);
                    g.connect(this.ctx.destination);
                    o.start(s);
                    o.stop(s + d);
                };
                tone(523.25, t, 0.1);
                tone(659.25, t + 0.1, 0.1);
                tone(783.99, t + 0.2, 0.3);
            }
        };
    </script>

    <script>
        let matrixStoreData = []; 
        let currentRotationAngle = 0;
        let isSpinning = false;
        let lastWinnerIndex = -1;
        let animationFrameId = null;
        let globalRequestStop = false;

        const segmentColors = [
            "#3498db", "#5dade2", "#2ecc71", "#58d68d", "#e67e22", 
            "#f5b041", "#9b59b6", "#af7ac5", "#1abc9c", "#48c9b0", 
            "#e74c3c", "#ec7063"
        ];

        window.addEventListener("DOMContentLoaded", () => {
            setupDragAndDropZone();
            setupFullscreenChangeListener();
            for (let i = 0; i < 4; i++) {
                matrixStoreData.push({ text: `Item ${i+1}`, img: "", imgObj: null });
            }
            renderStudioMatrixGUI();
        });

        function setupFullscreenChangeListener() {
            const events = ['fullscreenchange', 'webkitfullscreenchange', 'mozfullscreenchange', 'MSFullscreenChange'];
            events.forEach(evt => {
                document.addEventListener(evt, () => {
                    const isFull = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement;
                    const sidebar = document.getElementById("gameControlSidebar");
                    if (isFull) {
                        sidebar.classList.add("fullscreen-hide");
                    } else {
                        sidebar.classList.remove("fullscreen-hide");
                    }
                    setTimeout(() => { drawConsoleWheelGraphic(currentRotationAngle); }, 150);
                });
            });
        }

        function toggleAdvancedFullscreenMode() {
            const targetElement = document.getElementById("arenaMainElement");
            const isFull = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement;

            if (!isFull) {
                if (targetElement.requestFullscreen) {
                    targetElement.requestFullscreen();
                } else if (targetElement.webkitRequestFullscreen) {
                    targetElement.webkitRequestFullscreen();
                } else if (targetElement.msRequestFullscreen) {
                    targetElement.msRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) {
                    document.msExitFullscreen();
                }
            }
        }

        function renderStudioMatrixGUI() {
            const wrapper = document.getElementById("matrixRowsWrapper");
            wrapper.innerHTML = "";

            matrixStoreData.forEach((row, index) => {
                const rowDiv = document.createElement("div");
                rowDiv.className = "matrix-row";

                const indexSpan = document.createElement("span");
                indexSpan.className = "matrix-index";
                indexSpan.innerText = `${index + 1}.`;
                rowDiv.appendChild(indexSpan);

                const wordInput = document.createElement("input");
                wordInput.type = "text";
                wordInput.className = "matrix-word-input";
                wordInput.placeholder = "Word / Name";
                wordInput.value = row.text;
                wordInput.oninput = (e) => {
                    matrixStoreData[index].text = e.target.value;
                    syncMatrixToBulkTextFields();
                };
                rowDiv.appendChild(wordInput);

                const mediaBlock = document.createElement("div");
                mediaBlock.className = "matrix-media-block";

                const linkInput = document.createElement("input");
                linkInput.type = "text";
                linkInput.className = "matrix-link-input";
                linkInput.placeholder = "Image Link (URL) or Click 📁";
                linkInput.value = row.img.startsWith("data:") ? "[Device Storage Image File Cached]" : row.img;
                linkInput.oninput = (e) => {
                    matrixStoreData[index].img = e.target.value;
                    matrixStoreData[index].imgObj = null; 
                    syncMatrixToBulkTextFields();
                };
                mediaBlock.appendChild(linkInput);

                const hiddenFileInput = document.createElement("input");
                hiddenFileInput.type = "file";
                hiddenFileInput.accept = "image/*";
                hiddenFileInput.style.display = "none";
                hiddenFileInput.onchange = (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = function(evt) {
                        matrixStoreData[index].img = evt.target.result;
                        matrixStoreData[index].imgObj = null; 
                        linkInput.value = "[Device Storage Image File Cached]";
                        syncMatrixToBulkTextFields();
                    };
                    reader.readAsDataURL(file);
                };
                mediaBlock.appendChild(hiddenFileInput);

                const fileBtn = document.createElement("button");
                fileBtn.className = "matrix-file-btn";
                fileBtn.innerHTML = "📁";
                fileBtn.onclick = () => hiddenFileInput.click();
                mediaBlock.appendChild(fileBtn);

                rowDiv.appendChild(mediaBlock);

                const delBtn = document.createElement("button");
                delBtn.className = "matrix-row-delete-btn";
                delBtn.innerText = "🗑️";
                delBtn.onclick = () => {
                    matrixStoreData.splice(index, 1);
                    renderStudioMatrixGUI();
                    syncMatrixToBulkTextFields();
                };
                rowDiv.appendChild(delBtn);

                wrapper.appendChild(rowDiv);
            });
        }

        function addBlankMatrixRowCell() {
            matrixStoreData.push({ text: "", img: "", imgObj: null });
            renderStudioMatrixGUI();
            syncMatrixToBulkTextFields();
        }

        function syncMatrixToBulkTextFields() {
            const wordsList = matrixStoreData.map(r => r.text).join('\n');
            const linksList = matrixStoreData.map(r => r.img.startsWith('data:') ? '' : r.img).join('\n');

            document.getElementById("wordItems").value = wordsList;
            document.getElementById("imageLinks").value = linksList;
        }

        function syncBulkTextToMatrix() {
            const bulkWordsText = document.getElementById("wordItems").value.trim();
            const wordsArray = bulkWordsText.split('\n').map(w => w.trim());

            if (wordsArray.length === 0 || (wordsArray.length === 1 && wordsArray[0] === "")) {
                matrixStoreData = [];
                renderStudioMatrixGUI();
                return;
            }

            let newMatrix = [];
            for (let i = 0; i < wordsArray.length; i++) {
                let currentWord = wordsArray[i];
                let inheritedImage = (matrixStoreData[i] && matrixStoreData[i].img) ? matrixStoreData[i].img : "";
                let inheritedImgObj = (matrixStoreData[i] && matrixStoreData[i].imgObj) ? matrixStoreData[i].imgObj : null;
                newMatrix.push({ text: currentWord, img: inheritedImage, imgObj: inheritedImgObj });
            }

            matrixStoreData = newMatrix;
            renderStudioMatrixGUI();
        }

        function syncBulkLinksToMatrix() {
            const bulkLinksText = document.getElementById("imageLinks").value.trim();
            const linksArray = bulkLinksText.split('\n').map(l => l.trim());

            while (matrixStoreData.length < linksArray.length) {
                matrixStoreData.push({ text: "", img: "", imgObj: null });
            }

            for (let i = 0; i < linksArray.length; i++) {
                if (linksArray[i] !== "") {
                    matrixStoreData[i].img = linksArray[i];
                    matrixStoreData[i].imgObj = null; 
                }
            }
            renderStudioMatrixGUI();
        }

        function getRomConfigurationPackage() {
            let dynamicFilterDataset = matrixStoreData.filter(item => item.text !== "" || item.img !== "");
            if (dynamicFilterDataset.length === 0) {
                alert("Please add data inside rows first!");
                return null;
            }
            const title = document.getElementById("gameTitle").value.trim() || "Spin-Wheel";
            const duration = parseInt(document.getElementById("spinDuration").value) || 5;
            return { title, duration, segments: dynamicFilterDataset };
        }

        function exportSpinWheelROMOnly() {
            const configPackage = getRomConfigurationPackage();
            if (!configPackage) return;

            const legacyFormatObject = {
                title: configPackage.title,
                gameType: "spin_wheel",
                duration: configPackage.duration,
                pairs: configPackage.segments.map(s => ({ a: s.text, b: s.img }))
            };

            const dataBlob = new Blob([JSON.stringify(legacyFormatObject, null, 2)], { type: "text/plain" });
            const downloader = document.createElement("a");
            downloader.download = `${configPackage.title}.txt`;
            downloader.href = URL.createObjectURL(dataBlob);
            downloader.click();
        }

        function launchAndPlayDirectly() {
            const configPackage = getRomConfigurationPackage();
            if (!configPackage) return;
            bootSpinWheelRuntimeEngine(configPackage.segments, configPackage.duration);
        }

        function importSpinWheelROM(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (evt) {
                try {
                    const rom = JSON.parse(evt.target.result);
                    if (rom.gameType !== 'spin_wheel' || !rom.pairs) throw new Error();

                    document.getElementById("gameTitle").value = rom.title || "Lucky Pack";
                    document.getElementById("spinDuration").value = rom.duration || 5;

                    matrixStoreData = rom.pairs.map(p => ({
                        text: p.a || "",
                        img: p.b || "",
                        imgObj: null
                    }));

                    renderStudioMatrixGUI();
                    syncMatrixToBulkTextFields();
                    
                    bootSpinWheelRuntimeEngine(matrixStoreData, rom.duration || 5);
                } catch (err) {
                    alert("Invalid Game Config file!");
                }
            };
            reader.readAsText(file);
        }

        function bootSpinWheelRuntimeEngine(segmentsList, durationSeconds) {
            document.getElementById("studioView").style.display = "none";
            document.getElementById("gameRuntimeView").style.display = "flex";
            document.getElementById("liveSecondsInput").value = durationSeconds;

            currentRotationAngle = 0;
            lastWinnerIndex = -1;
            isSpinning = false;
            globalRequestStop = false;

            matrixStoreData.forEach(seg => {
                if (seg.img && !seg.imgObj) {
                    let img = new Image();
                    img.src = seg.img;
                    img.onload = () => { drawConsoleWheelGraphic(currentRotationAngle); };
                    seg.imgObj = img;
                }
            });

            document.getElementById("runtimeWordItems").value = matrixStoreData.map(s => s.text).join('\n');
            document.getElementById("runtimeImageLinks").value = matrixStoreData.map(s => s.img.startsWith('data:') ? '' : s.img).join('\n');
            document.getElementById("spinActionBtn").innerText = "SPIN";

            setTimeout(() => { drawConsoleWheelGraphic(0); }, 100);
        }

        function syncRuntimeSidebarToWheel() {
            if (isSpinning) return;
            const wordsText = document.getElementById("runtimeWordItems").value.trim();
            const linksText = document.getElementById("runtimeImageLinks").value.trim();

            let wordsArray = wordsText.split('\n').map(w => w.trim());
            let linksArray = linksText.split('\n').map(l => l.trim());

            let loopLength = Math.max(wordsArray.length, linksArray.length);
            if (loopLength === 0 || (wordsArray.length === 1 && wordsArray[0] === "")) {
                alert("Element list array cannot be blanked completely!");
                return;
            }

            let newMatrix = [];
            for (let i = 0; i < loopLength; i++) {
                let txtVal = wordsArray[i] !== undefined ? wordsArray[i] : "";
                let imgVal = "";
                if (linksArray[i] !== undefined && linksArray[i] !== "") {
                    imgVal = linksArray[i];
                } else if (matrixStoreData[i] && matrixStoreData[i].img.startsWith('data:')) {
                    imgVal = matrixStoreData[i].img;
                }

                let seg = { text: txtVal, img: imgVal, imgObj: null };
                if (imgVal) {
                    let img = new Image();
                    img.src = imgVal;
                    img.onload = () => { drawConsoleWheelGraphic(currentRotationAngle); };
                    seg.imgObj = img;
                }
                newMatrix.push(seg);
            }

            matrixStoreData = newMatrix;
            renderStudioMatrixGUI();
            syncMatrixToBulkTextFields();

            currentRotationAngle = 0;
            drawConsoleWheelGraphic(0);
        }

        function drawConsoleWheelGraphic(currentRotationRad) {
            const canvas = document.getElementById("wheelCanvas");
            if (!canvas) return;
            const ctx = canvas.getContext("2d");
            ctx.clearRect(0, 0, 600, 600);

            const numSegs = matrixStoreData.length;
            if (numSegs === 0) return 0;

            const arcSize = (2 * Math.PI) / numSegs;

            ctx.save();
            ctx.translate(300, 300);
            ctx.rotate(currentRotationRad);

            for (let i = 0; i < numSegs; i++) {
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, 290, i * arcSize, (i + 1) * arcSize);

                let colorIdx = i;
                if (numSegs % 2 !== 0 && i === numSegs - 1) {
                    colorIdx = 3; 
                }

                ctx.fillStyle = segmentColors[colorIdx % segmentColors.length];
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = "#ffffff";
                ctx.stroke();

                ctx.save();
                ctx.rotate((i + 0.5) * arcSize);
                
                let seg = matrixStoreData[i];

                if (seg.imgObj && seg.imgObj.complete && seg.imgObj.naturalWidth !== 0) {
                    ctx.save();
                    let translateRadius = (seg.text === "") ? 185 : 165;
                    ctx.translate(translateRadius, 0);
                    ctx.rotate(Math.PI / 2);
                    ctx.beginPath();
                    let imageRadius = (seg.text === "") ? 35 : 26;
                    ctx.arc(0, 0, imageRadius, 0, Math.PI * 2);
                    ctx.clip();
                    ctx.drawImage(seg.imgObj, -imageRadius, -imageRadius, imageRadius*2, imageRadius*2);
                    ctx.restore();

                    if (seg.text !== "") {
                        ctx.fillStyle = "white";
                        let fontSize = seg.text.length > 12 ? 11 : 14;
                        ctx.font = `bold ${fontSize}px sans-serif`;
                        ctx.textAlign = "right";
                        ctx.textBaseline = "middle";
                        ctx.fillText(seg.text, 120, 0);
                    }
                } else if (seg.text !== "") {
                    ctx.fillStyle = "white";
                    let fontSize = 16;
                    if (seg.text.length > 12) fontSize = 13;
                    if (seg.text.length > 20) fontSize = 10;

                    ctx.font = `bold ${fontSize}px sans-serif`;
                    ctx.textAlign = "right";
                    ctx.textBaseline = "middle";
                    ctx.fillText(seg.text, 255, 0);
                }
                ctx.restore();
            }
            ctx.restore();

            const grad = ctx.createRadialGradient(300, 300, 20, 300, 300, 290);
            grad.addColorStop(0, 'rgba(255,255,255,0.05)');
            grad.addColorStop(1, 'rgba(0,0,0,0.15)');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(300, 300, 290, 0, Math.PI * 2);
            ctx.fill();

            let normalizedAngle = (2 * Math.PI - (currentRotationRad % (2 * Math.PI))) % (2 * Math.PI);
            let targetIdx = Math.floor(normalizedAngle / arcSize);
            if (targetIdx < 0 || targetIdx >= numSegs) targetIdx = 0;

            let finalColorIdx = targetIdx;
            if (numSegs % 2 !== 0 && targetIdx === numSegs - 1) {
                finalColorIdx = 3;
            }

            document.getElementById("wheelPointer").style.borderRightColor = segmentColors[finalColorIdx % segmentColors.length];
            return targetIdx;
        }

        function toggleWheelSpinEngine() {
            if (matrixStoreData.length === 0) return;
            if (isSpinning) {
                globalRequestStop = true;
                return;
            }
            triggerConsoleWheelSpin();
        }

        function triggerConsoleWheelSpin() {
            isSpinning = true;
            globalRequestStop = false;
            document.getElementById("spinActionBtn").innerText = "STOP";
            SoundFX.init();

            let spinSeconds = parseFloat(document.getElementById("liveSecondsInput").value) || 5;
            let totalDurationMs = spinSeconds * 1000;
            let startTimestamp = null;
            let startAngle = currentRotationAngle % (2 * Math.PI);
            
            let totalRotationToTarget = (Math.PI * 2 * 12) + (Math.random() * Math.PI * 2);
            let lastIdx = -1;

            function stepAnimateWheelTime(timestamp) {
                if (!startTimestamp) startTimestamp = timestamp;
                let elapsed = timestamp - startTimestamp;
                let t = elapsed / totalDurationMs;

                if (t > 1) t = 1;

                if (globalRequestStop) {
                    finalizeWinnerSelection(lastIdx);
                    return;
                }

                let easeOutProgression = 1 - Math.pow(1 - t, 3);
                let currentRad = startAngle + (totalRotationToTarget * easeOutProgression);
                currentRotationAngle = currentRad; 

                let liveActiveWinnerIdx = drawConsoleWheelGraphic(currentRad);

                if (liveActiveWinnerIdx !== lastIdx) {
                    let speedFactor = 1 - t; 
                    try { SoundFX.playFlip(speedFactor); } catch (e) {}
                    lastIdx = liveActiveWinnerIdx;
                }

                if (elapsed < totalDurationMs) {
                    animationFrameId = requestAnimationFrame(stepAnimateWheelTime);
                } else {
                    finalizeWinnerSelection(liveActiveWinnerIdx);
                }
            }
            animationFrameId = requestAnimationFrame(stepAnimateWheelTime);
        }

        function finalizeWinnerSelection(winnerIdx) {
            cancelAnimationFrame(animationFrameId);
            isSpinning = false;
            globalRequestStop = false;
            document.getElementById("spinActionBtn").innerText = "SPIN";
            
            if(winnerIdx < 0 || winnerIdx >= matrixStoreData.length) winnerIdx = 0;
            
            lastWinnerIndex = winnerIdx;
            SoundFX.playWin();

            let winner = matrixStoreData[winnerIdx];
            document.getElementById("spinResultValue").innerText = winner.text !== "" ? winner.text : "Slot Graphic Asset";
            
            let resImg = document.getElementById("spinResultImg");
            if (winner.img) {
                resImg.src = winner.img;
                resImg.style.display = "block";
            } else {
                resImg.style.display = "none";
                resImg.src = "";
            }

            document.getElementById("mask").style.display = "block";
            document.getElementById("spinResultBox").style.display = "block";
        }

        function removeWinnerNamePermanently() {
            if (lastWinnerIndex > -1 && matrixStoreData.length > 0) {
                matrixStoreData.splice(lastWinnerIndex, 1);
                renderStudioMatrixGUI();
                syncMatrixToBulkTextFields();

                lastWinnerIndex = -1;
                currentRotationAngle = 0;
                drawConsoleWheelGraphic(0);
            }
            closeConsoleSpinPopup();
        }

        function closeConsoleSpinPopup() {
            document.getElementById("mask").style.display = "none";
            document.getElementById("spinResultBox").style.display = "none";
        }

        function quitActiveGameEngine() {
            if (document.fullscreenElement || document.webkitFullscreenElement) {
                if (document.exitFullscreen) document.exitFullscreen();
            }
            cancelAnimationFrame(animationFrameId);
            isSpinning = false;
            globalRequestStop = false;
            document.getElementById("gameRuntimeView").style.display = "none";
            document.getElementById("studioView").style.display = "flex";
            document.getElementById("romLoader").value = "";
        }

        function setupDragAndDropZone() {
            const zone = document.getElementById("dropzone");
            zone.addEventListener('dragover', (e) => {
                e.preventDefault(); 
                zone.style.background = "rgba(109, 213, 250, 0.2)";
            });
            zone.addEventListener('dragleave', () => {
                zone.style.background = "rgba(109, 213, 250, 0.08)"; 
            });
            zone.addEventListener('drop', (e) => {
                e.preventDefault();
                zone.style.background = "rgba(109, 213, 250, 0.08)";
                const files = e.dataTransfer.files;
                if (files.length > 0 && files[0].name.endsWith('.txt')) {
                    document.getElementById('romLoader').files = files;
                    const event = { target: { files: files } };
                    importSpinWheelROM(event);
                }
            });
        }
    </script>
