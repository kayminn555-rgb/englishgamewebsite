<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educational Arcade Game Hub</title>
    <style>
        /* ======================== THEME & BACKGROUND ======================== */
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(circle at center, #0a3d70 0%, #03162b 100%);
            color: #ffffff; overflow-x: hidden; user-select: none;
        }
        body {
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            padding: 40px 20px; box-sizing: border-box;
        }

        /* Neon Title Header */
        h1 {
            font-size: 2.2rem; font-weight: bold; color: #ffffff;
            text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px;
            text-shadow: 0 0 15px rgba(0, 122, 255, 0.5); text-align: center;
        }
        .subtitle {
            font-size: 0.95rem; color: rgba(255, 255, 255, 0.7);
            margin-bottom: 45px; text-align: center; max-width: 600px; line-height: 1.5;
        }

        /* Compact & Smart Grid Layout */
        .menu-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px; width: 100%; max-width: 950px; padding: 10px; box-sizing: border-box;
        }

        /* [UPGRADE] Compact Card Style inspired by user photo */
        .game-card {
            background: rgba(255, 255, 255, 0.06);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px; padding: 20px 15px; text-align: center;
            cursor: pointer; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            text-decoration: none; color: white;
            position: relative; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            aspect-ratio: 1 / 1; /* Makes cards perfectly squared like a gaming console */
        }

        /* Hover Interaction Effects */
        .game-card:hover {
            border-color: #23007aff;
            transform: scale(1.06) translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 122, 255, 0.4), 0 0 15px #007aff;
            background: rgba(0, 122, 255, 0.1);
        }

        /* Elements Inside Card */
        .icon {
            font-size: 3rem; margin-bottom: 12px; display: block;
            transition: transform 0.3s ease; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }
        .game-card:hover .icon { transform: scale(1.15); }
        
        .game-title {
            font-size: 1.15rem; font-weight: bold; color: #ffffff;
            letter-spacing: 0.5px; margin: 0; text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        
        .game-type {
            font-size: 0.75rem; color: #f1c40f; text-transform: uppercase;
            font-weight: bold; margin-top: 5px; letter-spacing: 0.5px;
        }

        .game-badge {
            position: absolute; top: 10px; right: 10px; font-size: 8px;
            font-weight: bold; background: #007aff; padding: 3px 6px;
            border-radius: 4px; text-transform: uppercase; z-index: 2;
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.6rem; }
            .menu-container { grid-template-columns: repeat(2, 1fr); gap: 12px; } /* 2 columns layout on mobile */
            .game-title { font-size: 1rem; }
            .icon { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <!-- Main Header (English Only) -->
    <h1>Educational Game Hub</h1>
    <p class="subtitle">Select a game pack below to start playing instantly or generate your custom lesson ROM files.</p>

    <!-- Game Cards Matrix Grid -->
    <div class="menu-container" id="arcadeGrid">
        <!-- Automatically injected by JavaScript below -->
    </div>

    <!-- ======================== CONFIG ENGINE SYSTEM ======================== -->
    <script>
        /* 
           ✏️ EASY ADD MODE: 
           To add a new game, just insert a new line inside the [ ] brackets below:
           { icon: "🎁", title: "Game Name", type: "ROM Engine", link: "file_name.html" },
        */
        const myArcadeGamesConfig = [
            {
                icon: "🎯",
                title: "Match Up Studio",
                type: "Memory Engine",
                link: "match_up.html"
            },
            {
                icon: "🖼️",
                title: "Behind the Card",
                type: "Reveal Engine",
                link: "behind_the_card.html"
            },
            {
                icon: "🎡",
                title: "Spin Wheel Factory",
                type: "Wheel Engine",
                link: "spin_wheel.html"
            }
            /* 🔗 ADD NEW GAME CARDS HERE: Copy/Paste the line below and change details */
            // { icon: "📝", title: "Quiz Time", type: "Trivia Engine", link: "quiz.html" },
        ];

        // Core Automatic Card Generator Engine
        function generateArcadePackHub() {
            const grid = document.getElementById("arcadeGrid");
            grid.innerHTML = ""; 

            myArcadeGamesConfig.forEach(game => {
                const cardAnchor = document.createElement("a");
                cardAnchor.href = game.link;
                cardAnchor.className = "game-card";

                cardAnchor.innerHTML = `
                    <div class="game-badge">Online</div>
                    <span class="icon">${game.icon}</span>
                    <div class="game-title">${game.title}</div>
                    <div class="game-type">${game.type}</div>
                `;
                grid.appendChild(cardAnchor);
            });
        }

        // Boot Launcher
        window.addEventListener("DOMContentLoaded", generateArcadePackHub);
    </script>

</body>
</html>
