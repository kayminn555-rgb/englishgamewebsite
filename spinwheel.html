<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spin Wheel - Advanced Studio & Emulator Engine</title>
    <style>
        /* ======================== STYLE: STUDIO LAYOUT & THEME ======================== */
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', -apple-system, sans-serif;
            background: linear-gradient(135deg, #11335c, #061933); color: white;
            overflow-x: hidden;
            user-select: none;
        }
        .app-container {
            width: 100%; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 15px; box-sizing: border-box;
        }
        .studio-box {
            width: 100%; max-width: 600px; background: rgba(0, 0, 0, 0.6); padding: 25px;
            border-radius: 15px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.15); box-sizing: border-box;
        }
        h2 { margin-top: 0; margin-bottom: 5px; color: #f1c40f; text-align: center; text-transform: uppercase; font-size: 22px; }
        .subtitle { text-align: center; font-size: 13px; color: #cbd5e1; margin-bottom: 20px; }
        
        /* Dropzone Component */
        .file-dropzone {
            background: rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 10px; margin-bottom: 20px;
            text-align: center; border: 2px dashed #f1c40f; cursor: pointer; transition: background 0.2s;
        }
        .file-dropzone:hover { background: rgba(255, 255, 255, 0.15); }
        .file-dropzone p { margin: 0; font-size: 16px; color: #fff; font-weight: bold; }
        .file-dropzone span { font-size: 12px; color: #ccc; display: block; margin-top: 4px; }

        /* Form Components */
        label { font-weight: bold; display: block; margin-top: 15px; margin-bottom: 5px; font-size: 13px; color: #cbd5e1; text-transform: uppercase; }
        .studio-input { width: 100%; padding: 12px; border: 1px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.1); color: white; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        .studio-input:focus { outline: none; border-color: #f1c40f; background: rgba(255,255,255,0.15); }
        textarea.studio-input { height: 140px; resize: none; }
        
        /* Buttons */
        .btn-export { background: #e67e22; color: white; width: 100%; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; margin-top: 25px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3); transition: background 0.2s, transform 0.1s; }
        .btn-export:active { transform: scale(0.98); }

        /* ======================== STYLE: SPIN WHEEL RUNTIME ======================== */
        .game-section { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 20; }
        .game-arena {
            width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 15px; box-sizing: border-box;
            background-image: url('https://github.com/kayminn555-rgb/English_games/blob/main/one_ce_bg.jpg?raw=true'), linear-gradient(to bottom, #11335c, #061933);
            background-size: cover; background-position: center; background-repeat: no-repeat; position: relative;
        }

        /* Spin Main Content Board Layout */
        .spin-container { display: flex; flex-direction: column; align-items: center; justify-content: center; margin: auto; position: relative; width: 100%; z-index: 10; height: calc(100% - 70px); }
        .live-spin-time-box { background: rgba(44, 62, 80, 0.95); padding: 6px 15px; border-radius: 8px; border: 2px solid #ffffff; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3); display: flex; align-items: center; gap: 10px; font-weight: bold; margin-bottom: 20px; z-index: 20; font-size: 13px; color: white; }
        .live-spin-time-box input { width: 45px; padding: 4px; font-size: 13px; border-radius: 4px; border: none; text-align: center; font-weight: bold; color: #2c3e50; }

        /* Ferris Iron Leg Framework Component */
        .ferris-wheel-frame { position: relative; width: 100%; max-width: 580px; height: 100%; max-height: 520px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* [ပြင်ဆင်ချက်] - ဒိုင်ခွက် (450px) အတွက် Frame Position အချိုးအစား ပြန်ညှိခြင်း */
        .wheel-wrapper { position: absolute; top: 0; width: 450px; height: 450px; border-radius: 50%; border: 4px solid #ffffff; box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6); background: #ffffff; z-index: 10; display: flex; align-items: center; justify-content: center; }
        
        /* [ပြင်ဆင်ချက်] - ထောင့်တိုင် တန်းလန်းဖြစ်နေတာကို အောက်ခြေအထိ ဆွဲဆန့်ပြီး ဖိနပ်တုံးနဲ့ ကပ်လိုက်ခြင်း */
        .ferris-iron-leg-left { position: absolute; bottom: -30px; left: 145px; width: 12px; height: 260px; background: linear-gradient(to right, #bdc3c7, #ffffff, #7f8c8d); transform: rotate(16deg); transform-origin: bottom center; z-index: 5; }
        .ferris-iron-leg-right { position: absolute; bottom: -30px; right: 145px; width: 12px; height: 260px; background: linear-gradient(to right, #bdc3c7, #ffffff, #7f8c8d); transform: rotate(-16deg); transform-origin: bottom center; z-index: 5; }
        .leg-foot-left { position: absolute; bottom: -35px; left: 125px; width: 36px; height: 12px; background: #7f8c8d; border-radius: 3px; z-index: 6; }
        .leg-foot-right { position: absolute; bottom: -35px; right: 125px; width: 36px; height: 12px; background: #7f8c8d; border-radius: 3px; z-index: 6; }
        
        /* [ပြင်ဆင်ချက်] - မြှားကို ဒိုင်ခွက်အထဲမရောက်စေဘဲ ညာဘက်အပြင်နားမှာ ကပ်ရပ်တည်ရှိနေစေခြင်း */
        .wheel-pointer-right { position: absolute; top: 225px; right: -24px; transform: translateY(-50%); width: 0; height: 0; border-top: 24px solid transparent; border-bottom: 24px solid transparent; border-right: 50px solid #e74c3c; z-index: 30; filter: drop-shadow(-3px 3px 5px rgba(0,0,0,0.5)); }
        
        .center-hub { position: absolute; top: 225px; left: 50%; transform: translate(-50%,-50%); width: 75px; height: 75px; background: radial-gradient(circle, #ffffff, #cbd5e1, #7f8c8d); border: 3px solid #95a5a6; border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.4); z-index: 40; display: flex; align-items: center; justify-content: center; }
        .spin-trigger-btn { width: 55px; height: 55px; background: linear-gradient(135deg, #f39c12, #e67e22, #d35400); border: none; border-radius: 50%; color: white; font-size: 12px; font-weight: bold; cursor: pointer; }

        /* Universal Navigation Control Bar Bottom */
        .bottom-bar { background: rgba(0, 0, 0, 0.6); display: flex; justify-content: center; align-items: center; padding: 0 15px; width: 100%; height: 55px; box-sizing: border-box; z-index: 50; }
        .btn-console { padding: 8px 25px; font-size: 14px; border-radius: 5px; cursor: pointer; font-weight: bold; border: none; background: #e74c3c; color: white; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3); }

        /* WINNER POPUP BOX VIEWPORT */
        .overlay-mask { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1500; }
        .spin-result-popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: #ffffff; color: #2c3e50; padding: 25px 35px; border-radius: 15px; text-align: center; box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7); z-index: 3000; border: 4px solid #f1c40f; min-width: 290px; }
        .spin-result-popup h3 { margin: 0; font-size: 1.2rem; color: #7f8c8d; text-transform: uppercase; }
        .spin-result-popup div { font-size: 36px; font-weight: bold; margin: 12px 0; color: #e67e22; word-break: break-word; }
        .popup-btn-container { display: flex; gap: 15px; justify-content: center; margin-top: 15px; }
        .btn-popup { padding: 10px 20px; font-weight: bold; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2); }
        .btn-popup-remove { background: #e74c3c; color: white; }
        .btn-popup-keep { background: #2ecc71; color: white; }

        /* Responsive Mobile Layout Updates */
        @media (max-width: 768px) {
            .wheel-wrapper { width: 340px; height: 340px; }
            .wheel-pointer-right { top: 170px; right: -20px; border-right-width: 38px; border-top-width: 16px; border-bottom-width: 16px; }
            .center-hub { top: 170px; width: 60px; height: 60px; }
            .spin-trigger-btn { width: 44px; height: 44px; font-size: 10px; }
            .ferris-iron-leg-left, .ferris-iron-leg-right { height: 180px; bottom: -15px; }
            .ferris-iron-leg-left { left: 95px; }
            .ferris-iron-leg-right { right: 95px; }
            .leg-foot-left { left: 80px; bottom: -20px; }
            .leg-foot-right { right: 80px; bottom: -20px; }
        }
    </style>
</head>
<body>

    <div class="app-container" id="studioView">
        <!-- ============================== MAKER STUDIO INTERFACE ============================== -->
        <div class="studio-box">
            <h2>🎯 Spin Wheel Pack Factory</h2>
            <p class="subtitle">နာမည်စာရင်းအသစ်ထုတ်ရန် သို့မဟုတ် ရှိပြီးသားဖိုင်တင်၍ ဘီးလှည့်ရန်</p>

            <div class="file-dropzone" id="dropzone" onclick="document.getElementById('romLoader').click()">
                <p>📥 Click or Drag Spin Wheel ROM (.txt)</p>
                <span>ဆော့မည့် နာမည်စာရင်းဖိုင်တင်ရန်</span>
                <input type="file" id="romLoader" accept=".txt" style="display: none;" onchange="importSpinWheelROM(event)">
            </div>

            <label>Enter Game Title / ဂိမ်းခေါင်းစဉ် :</label>
            <input type="text" id="gameTitle" class="studio-input" value="Lucky Student Spin">

            <label>Default Spin Duration (Seconds / စက္ကန့်သတ်မှတ်ရန်) :</label>
            <input type="number" id="spinDuration" class="studio-input" value="5" min="2" max="60">

            <label>Enter Student Names / Words (နာမည်စာရင်းများ - တစ်ကြောင်းလျှင် တစ်ခုစီထည့်ရန်) :</label>
            <textarea id="wordItems" class="studio-input" placeholder="Somchai&#10;Somsri&#10;John Doe"></textarea>

            <button class="btn-export" onclick="exportSpinWheelROM()">Export ROM File (.txt)</button>
        </div>
    </div>

    <!-- ============================== RUNTIME SPIN WHEEL EMULATOR ============================== -->
    <div class="game-section" id="gameRuntimeView">
        <div class="game-arena">
            
            <div class="spin-container">
                <div class="live-spin-time-box">
                    <span>Spin:</span>
                    <input type="number" id="liveSecondsInput" value="5" min="2" max="60">
                    <span>Secs</span>
                </div>

                <div class="ferris-wheel-frame">
                    <div class="ferris-iron-leg-left"></div>
                    <div class="ferris-iron-leg-right"></div>
                    <div class="leg-foot-left"></div>
                    <div class="leg-foot-right"></div>
                    
                    <div class="wheel-wrapper">
                        <canvas id="wheelCanvas" width="450" height="450"></canvas>
                        <div class="wheel-pointer-right" id="wheelPointer"></div>
                    </div>

                    <div class="center-hub">
                        <button class="spin-trigger-btn" onclick="triggerConsoleWheelSpin()">SPIN</button>
                    </div>
                </div>
            </div>

            <div class="bottom-bar">
                <button class="btn-console" onclick="quitActiveGameEngine()">Close Engine</button>
            </div>
        </div>
    </div>

    <div class="overlay-mask" id="mask"></div>
    <div class="spin-result-popup" id="spinResultBox">
        <h3>Selected Winner</h3>
        <div id="spinResultValue">-</div>
        <div class="popup-btn-container">
            <button class="btn-popup btn-popup-remove" onclick="removeWinnerNamePermanently()">X Remove Name</button>
            <button class="btn-popup btn-popup-keep" onclick="closeConsoleSpinPopup()">Keep & Close</button>
        </div>
    </div>

    <script>
        const SoundFX = {
            ctx: null,
            init() { if (!this.ctx) { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } if (this.ctx.state === 'suspended') this.ctx.resume(); },
            playFlip() { this.init(); const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain(); osc.type = 'sine'; osc.frequency.setValueAtTime(550, this.ctx.currentTime); gain.gain.setValueAtTime(0.04, this.ctx.currentTime); gain.gain.linearRampToValueAtTime(0.001, this.ctx.currentTime + 0.02); osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + 0.02); },
            playWin() { this.init(); const t = this.ctx.currentTime; const tone = (f, s, d) => { const o = this.ctx.createOscillator(); const g = this.ctx.createGain(); o.type = 'square'; o.frequency.setValueAtTime(f, s); g.gain.setValueAtTime(0.05, s); g.gain.linearRampToValueAtTime(0.001, s + d); o.connect(g); g.connect(this.ctx.destination); o.start(s); o.stop(s + d); }; tone(523.25, t, 0.1); tone(659.25, t + 0.1, 0.1); tone(783.99, t + 0.2, 0.3); }
        };
    </script>

    <script>
        let wheelSegments = [];
        let currentRotationAngle = 0;
        let isSpinning = false;
        let lastWinnerIndex = -1;

        const segmentColors = ["#1abc9c", "#e67e22", "#3498db", "#2ecc71", "#9b59b6", "#f1c40f", "#34495e", "#e74c3c", "#16a085", "#27ae60", "#2980b9", "#8e44ad"];

        window.addEventListener("DOMContentLoaded", () => {
            setupDragAndDropZone();
        });

        function exportSpinWheelROM() {
            const title = document.getElementById("gameTitle").value.trim() || "Spin-Wheel";
            const duration = parseInt(document.getElementById("spinDuration").value) || 5;
            const wordsText = document.getElementById("wordItems").value.trim();

            if (!wordsText) return alert("Please enter at least one name or word!");

            let wordsArray = [];
            wordsText.split('\n').forEach(w => { if (w.trim() !== "") wordsArray.push(w.trim()); });

            if (wordsArray.length === 0) return alert("Please enter valid names or words!");

            const romObject = {
                title: title,
                gameType: "spin_wheel",
                duration: duration,
                pairs: wordsArray.map(w => ({ a: w, b: "" }))
            };

            const dataBlob = new Blob([JSON.stringify(romObject, null, 2)], { type: "text/plain" });
            const downloader = document.createElement("a");
            downloader.download = `${title}.txt`;
            downloader.href = URL.createObjectURL(dataBlob);
            downloader.click();
        }

        function importSpinWheelROM(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (evt) {
                try {
                    const rom = JSON.parse(evt.target.result);
                    if (rom.gameType !== 'spin_wheel' || !rom.pairs) throw new Error();

                    document.getElementById("gameTitle").value = rom.title || "Lucky Pack";
                    document.getElementById("spinDuration").value = rom.duration || 5;
                    
                    const itemsString = rom.pairs.map(p => p.a).join('\n');
                    document.getElementById("wordItems").value = itemsString;

                    bootSpinWheelRuntimeEngine(rom.pairs.map(p => p.a), rom.duration || 5);
                } catch (err) {
                    alert("Invalid Game File Format!");
                }
            };
            reader.readAsText(file);
        }

        function bootSpinWheelRuntimeEngine(itemsList, durationSeconds) {
            document.getElementById("studioView").style.display = "none";
            document.getElementById("gameRuntimeView").style.display = "block";

            document.getElementById("liveSecondsInput").value = durationSeconds;
            wheelSegments = itemsList;
            currentRotationAngle = 0;
            lastWinnerIndex = -1;
            isSpinning = false;

            drawConsoleWheelGraphic(0);
        }

        function drawConsoleWheelGraphic(currentRotationRad) {
            const canvas = document.getElementById("wheelCanvas");
            const ctx = canvas.getContext("2d");
            ctx.clearRect(0, 0, 450, 450);

            const numSegs = wheelSegments.length;
            if (numSegs === 0) return 0;

            const arcSize = (2 * Math.PI) / numSegs;
            ctx.save();
            ctx.translate(225, 225);
            ctx.rotate(currentRotationRad);

            for (let i = 0; i < numSegs; i++) {
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, 220, i * arcSize, (i + 1) * arcSize);

                let colorIdx = i;
                if (numSegs % 2 !== 0 && i === numSegs - 1) { colorIdx = 4; }
                
                ctx.fillStyle = segmentColors[colorIdx % segmentColors.length];
                ctx.fill();
                ctx.lineWidth = 1.5;
                ctx.strokeStyle = "#ffffff";
                ctx.stroke();

                ctx.save();
                ctx.rotate((i + 0.5) * arcSize);
                ctx.fillStyle = "white";
                
                let text = wheelSegments[i];
                let fontSize = 16;
                if (text.length > 12) fontSize = 13;
                if (text.length > 20) fontSize = 8;
                
                ctx.font = `bold ${fontSize}px sans-serif`;
                ctx.textAlign = "right";
                ctx.textBaseline = "middle";
                ctx.fillText(text, 205, 0);
                ctx.restore();
            }
            ctx.restore();

            const grad = ctx.createRadialGradient(225, 225, 20, 225, 225, 220);
            grad.addColorStop(0, 'rgba(255,255,255,0.05)');
            grad.addColorStop(1, 'rgba(0,0,0,0.3)');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(225, 225, 220, 0, Math.PI * 2);
            ctx.fill();

            let normalizedAngle = (2 * Math.PI - (currentRotationRad % (2 * Math.PI))) % (2 * Math.PI);
            let targetIdx = Math.floor(normalizedAngle / arcSize);
            if (targetIdx < 0 || targetIdx >= numSegs) targetIdx = 0;

            let finalColorIdx = targetIdx;
            if (numSegs % 2 !== 0 && targetIdx === numSegs - 1) { finalColorIdx = 4; }
            document.getElementById("wheelPointer").style.borderRightColor = segmentColors[finalColorIdx % segmentColors.length];

            return targetIdx;
        }

        function triggerConsoleWheelSpin() {
            if (isSpinning || wheelSegments.length === 0) return;
            
            if (finalRuntimeImagesListCheck() === false) {
                const wordsText = document.getElementById("wordItems").value.trim();
                let currentLiveArr = [];
                wordsText.split('\n').forEach(w => { if (w.trim() !== "") currentLiveArr.push(w.trim()); });
                if(currentLiveArr.length > 0) wheelSegments = currentLiveArr;
            }

            if (wheelSegments.length === 0) return alert("မောင်းနှင်ရန် နာမည်စာရင်း မရှိပါ။");

            isSpinning = true;
            SoundFX.init();

            let spinSeconds = parseFloat(document.getElementById("liveSecondsInput").value) || 5;
            let totalDurationMs = spinSeconds * 1000;
            let startTimestamp = null;

            let startAngle = currentRotationAngle % (2 * Math.PI);
            let totalRotationToTarget = (Math.PI * 2 * 12) + (Math.random() * Math.PI * 2); 
            let lastIdx = -1;

            function stepAnimateWheelTime(timestamp) {
                if (!startTimestamp) startTimestamp = timestamp;
                let elapsed = timestamp - startTimestamp;

                let t = elapsed / totalDurationMs;
                if (t > 1) t = 1;

                let easeOutProgression = 1 - Math.pow(1 - t, 3);
                let currentRad = startAngle + (totalRotationToTarget * easeOutProgression);

                let liveActiveWinnerIdx = drawConsoleWheelGraphic(currentRad);

                if (liveActiveWinnerIdx !== lastIdx) {
                    try { SoundFX.playFlip(); } catch (e) {}
                    lastIdx = liveActiveWinnerIdx;
                }

                if (elapsed < totalDurationMs) {
                    requestAnimationFrame(stepAnimateWheelTime);
                } else {
                    currentRotationAngle = currentRad;
                    lastWinnerIndex = liveActiveWinnerIdx;
                    isSpinning = false;
                    
                    SoundFX.playWin();
                    document.getElementById("spinResultValue").innerText = wheelSegments[liveActiveWinnerIdx];
                    document.getElementById("mask").style.display = "block";
                    document.getElementById("spinResultBox").style.display = "block";
                }
            }
            requestAnimationFrame(stepAnimateWheelTime);
        }

        function removeWinnerNamePermanently() {
            if (lastWinnerIndex > -1 && wheelSegments.length > 0) {
                wheelSegments.splice(lastWinnerIndex, 1);
                document.getElementById("wordItems").value = wheelSegments.join('\n');
                lastWinnerIndex = -1;
                currentRotationAngle = 0;
                drawConsoleWheelGraphic(0);
            }
            closeConsoleSpinPopup();
        }

        function closeConsoleSpinPopup() {
            document.getElementById("mask").style.display = "none";
            document.getElementById("spinResultBox").style.display = "none";
        }

        function quitActiveGameEngine() {
            document.getElementById("gameRuntimeView").style.display = "none";
            document.getElementById("studioView").style.display = "flex";
            document.getElementById("romLoader").value = "";
        }

        function finalRuntimeImagesListCheck() {
            return wheelSegments.length > 0 && document.getElementById("studioView").style.display === "none";
        }

        function setupDragAndDropZone() {
            const zone = document.getElementById("dropzone");
            zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.style.background = "rgba(255,255,255,0.15)"; });
            zone.addEventListener('dragleave', () => { zone.style.background = "rgba(255,255,255,0.1)"; });
            zone.addEventListener('drop', (e) => {
                e.preventDefault();
                zone.style.background = "rgba(255,255,255,0.1)";
                const files = e.dataTransfer.files;
                if (files.length > 0 && files[0].name.endsWith('.txt')) {
                    document.getElementById('romLoader').files = files;
                    const event = { target: { files: files } };
                    importSpinWheelROM(event);
                }
            });
        }
    </script>
</body>
</html>
